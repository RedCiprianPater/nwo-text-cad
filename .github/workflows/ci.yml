name: CI
on:
  push:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pytest
    - run: pip install -e .
    - run: pytest tests/ -v || echo "No tests yet"
